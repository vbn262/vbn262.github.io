        const wallPage = document.getElementById('wallPage');
        const grid = document.getElementById('wallpaperGrid');
        const btns = document.querySelectorAll('.cate-btn');

        btns.forEach(btn => {
            btn.onclick = function () {
                btns.forEach(b => {b.className = 'cate-btn mr-5';})
                this.className = 'cate-btn mr-5 border-b-[3px] border-[#ec4899] text-[#ec4899]';

                this.scrollIntoView({
                    behavior: 'smooth',
                    block: 'nearest',
                    inline: 'center'
                });

                let type = this.dataset.type;
                if (type === 'home') {
                    document.getElementById('homePage').classList.remove('hidden');
                    wallPage.classList.add('hidden');
                } else {
                    document.getElementById('homePage').classList.add('hidden');
                    wallPage.classList.remove('hidden');
                    let list = WALLPAPER_DATA.filter(item => item.tag === type);
                    grid.innerHTML = list.length ? list.map(item => `
                            <div class="rounded-xl overflow-hidden shadow-sm hover:scale-105 transition-transform bg-white">
                                <div class="w-full h-[220px] img-placeholder">
                                    <img src="${item.url}" class="w-full h-full object-cover wallpaper-img opacity-0" loading="lazy" alt="${item.tag}">
                                </div>
                            </div>
                        `).join('') : '<div class="col-span-full py-10 text-center text-gray-500">暂无壁纸</div>';

                    grid.querySelectorAll('img').forEach(img => {
                        img.onload = () => img.classList.add('loaded');
